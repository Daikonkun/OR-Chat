<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenRouter Chat</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Login overlay -->
  <div id="login-overlay">
    <form id="login-form">
      <h2>🔒 Login Required</h2>
      <p>Enter the password to access OpenRouter Chat.</p>
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" autofocus>
      <button type="submit" id="login-btn">Sign In</button>
      <div id="login-error" hidden></div>
    </form>
  </div>

  <div id="app" hidden>
    <header>
      <h1>OpenRouter Chat</h1>
      <div class="controls">
        <select id="author-select">
          <option value="x-ai">xAI</option>
          <option value="deepseek">DeepSeek</option>
          <option value="xiaomi">Xiaomi</option>
          <option value="minimax">MiniMax</option>
        </select>
        <select id="model-select">
          <option value="">Loading models…</option>
        </select>
        <span id="api-badge" class="api-badge" hidden></span>
        <button id="new-chat-btn" title="New chat">+ New</button>
        <button id="nsfw-toggle-btn" title="Toggle NSFW mode">🔞</button>
        <button id="logout-btn" title="Logout" hidden>🚪</button>
      </div>
    </header>

    <main id="chat-container">
      <div id="messages"></div>
    </main>

    <footer>
      <div id="image-preview-bar"></div>
      <form id="chat-form">
        <label id="upload-label" title="Attach image">
          📎
          <input type="file" id="image-input" accept="image/png,image/jpeg,image/gif,image/webp" multiple hidden>
        </label>
        <textarea id="message-input" rows="1" placeholder="Type a message or /imagine prompt…" autofocus></textarea>
        <select id="aspect-ratio-select" title="Aspect ratio (for /imagine)">
          <option value="">Ratio</option>
          <option value="1:1">1:1</option>
          <option value="16:9">16:9</option>
          <option value="9:16">9:16</option>
          <option value="4:3">4:3</option>
          <option value="3:2">3:2</option>
          <option value="2:1">2:1</option>
          <option value="auto">Auto</option>
        </select>
        <button type="button" id="imagine-btn" title="Generate image (/imagine)">🎨</button>
        <button type="submit" id="send-btn">Send</button>
      </form>
      <div id="drop-overlay">Drop image here</div>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
